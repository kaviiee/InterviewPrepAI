services:

  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}

    ports:
      - "3000:3000"

    depends_on:
      - backend